<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Vegeta Red Arc V1</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- OneSignal SDK -->
  <script src="https://cdn.onesignal.com/sdks/web/v16/OneSignalSDK.page.js" defer></script>
  <script>
    window.OneSignalDeferred = window.OneSignalDeferred || [];
    OneSignalDeferred.push(async function (OneSignal) {
      await OneSignal.init({
        appId: "00af3fe7-664e-4796-a49a-fe05f0ac5364",
        notifyButton: { enable: false },
        allowLocalhostAsSecureOrigin: true,
        serviceWorkerPath: "OneSignalSDKWorker.js",
        serviceWorkerParam: { scope: "/" }
      });
    });
  </script>

  <style>
    body {
      font-family: Arial;
      background: black;
      color: white;
      padding: 20px;
      text-align: center;
    }
    button {
      padding: 12px;
      margin: 10px;
      font-size: 16px;
    }
    input {
      padding: 10px;
      margin: 10px;
      width: 80%;
    }
  </style>
</head>

<body>

  <h1>Vegeta Red Arc</h1>

  <button onclick="enableNotifications()">Enable Notifications</button>

  <br>

  <input type="text" id="task" placeholder="Enter reminder">
  <input type="datetime-local" id="time">

  <br>

  <button onclick="scheduleTask()">Schedule Reminder</button>

  <script>

    function enableNotifications() {
      Notification.requestPermission().then(permission => {
        if (permission === "granted") {
          alert("Notifications enabled");
        }
      });
    }

    function scheduleTask() {
      const task = document.getElementById("task").value;
      const time = document.getElementById("time").value;

      if (!task || !time) {
        alert("Fill everything");
        return;
      }

      const target = new Date(time).getTime();
      const now = new Date().getTime();
      const diff = target - now;

      if (diff <= 0) {
        alert("Time must be in future");
        return;
      }

      // LOCAL TEST ONLY (will NOT work reliably in background)
      setTimeout(() => {
        new Notification("Reminder", {
          body: task
        });
      }, diff);

      alert("Reminder set (works only while app is open)");
    }

  </script>

</body>
</html>
